[tools]
python = "3.12"
uv = "0.7.10"

[env]
# Load API keys from .env (do not commit secrets)
_.file = ".env"
# NOTE: keep in sync with config.py
DEFAULT_LLM_PROVIDER = { default = "openai" }
# NOTE: keep in sync with config.py
DEEPSEEK_MODEL = { default = "deepseek-chat" }

[tasks.test]
description = "Run the test suite"
run = "uv run pytest"

[tasks.sync]
description = "Sync project dependencies"
run = "uv sync"


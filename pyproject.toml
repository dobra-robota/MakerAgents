[project]
name = "makeragents"
version = "0.1.0"
description = "Local-first community opportunity research schemas and configuration."
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
    "langgraph==1.2.6",
    "pydantic==2.13.4",
    "typer==0.26.7",
]

[build-system]
requires = ["hatchling==1.30.1"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest==9.1.1",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
